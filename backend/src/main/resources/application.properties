server.port=8081

spring.datasource.url=${MANEMADE_DB_URL:jdbc:h2:file:./data/manemade;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE}
spring.datasource.username=${MANEMADE_DB_USERNAME:sa}
spring.datasource.password=${MANEMADE_DB_PASSWORD:}
spring.datasource.driver-class-name=${MANEMADE_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

logging.level.org.springframework.security=INFO
logging.level.manemade.backend=INFO

manemade.jwt.secret=${MANEMADE_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
manemade.jwt.expiration=${MANEMADE_JWT_EXPIRATION:86400000}
